<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhysioFlow Cloud Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .signature-canvas { cursor: crosshair; touch-action: none; }
        .pulse-red { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        .pulse-indigo { animation: pulse-indigo 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .6; transform: scale(0.95); } }
        @keyframes pulse-indigo { 0%, 100% { background-color: rgba(79, 70, 229, 0.1); } 50% { background-color: rgba(79, 70, 229, 0.25); } }
        .view-transition { transition: opacity 0.2s ease-in-out; }
        .scroll-hide::-webkit-scrollbar { display: none; }
        .stat-card { transition: all 0.2s ease; }
        .stat-card:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <!-- Cloud Status Header -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-30 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 text-indigo-700">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 19a3.5 3.5 0 0 0 0-7h-1.5a7 7 0 1 0-11.91-1.49c-1.45.77-2.09 2.51-1.59 4.1a3.5 3.5 0 0 0 3.5 2.39Z"/><path d="M12 11v4"/><path d="m9 13 3 3 3-3"/></svg>
                <h1 class="text-xl font-black tracking-tight text-slate-800 uppercase">Physio<span class="text-indigo-600">Flow</span> <span class="text-[10px] bg-indigo-100 px-1.5 py-0.5 rounded ml-1">CLOUD</span></h1>
            </div>
            <div class="flex items-center gap-4">
                <div id="connectionStatus" class="flex items-center gap-2 px-3 py-1 bg-slate-100 rounded-full text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                    <div class="w-2 h-2 rounded-full bg-slate-300"></div> Syncing...
                </div>
                <button onclick="showView('new-entry')" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-bold transition-all flex items-center gap-2 text-sm shadow-md active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                    <span>New Transfer</span>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-6">
        <!-- View Toggle -->
        <div class="flex gap-2 bg-slate-200/50 p-1 rounded-xl w-fit mb-6">
            <button id="tab-board" onclick="showView('board')" class="px-6 py-2 rounded-lg text-sm font-bold transition-all bg-white text-indigo-600 shadow-sm">Live Tracking Board</button>
            <button id="tab-new" onclick="showView('new-entry')" class="px-6 py-2 rounded-lg text-sm font-bold transition-all text-slate-600 hover:bg-slate-200">Submit Record</button>
        </div>

        <!-- Tracking Board View -->
        <div id="view-board" class="view-transition space-y-6">
            
            <!-- Quick Stats Dashboard -->
            <div id="statsDashboard" class="grid grid-cols-2 md:grid-cols-5 gap-3">
                <!-- Dynamically injected stats -->
                <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-col justify-center items-center h-24 animate-pulse">
                    <div class="h-4 w-12 bg-slate-100 rounded mb-2"></div>
                    <div class="h-6 w-8 bg-slate-200 rounded"></div>
                </div>
            </div>

            <!-- Filters -->
            <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-col md:flex-row gap-4 items-stretch md:items-end">
                <div class="flex-1">
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-1 tracking-widest">Search Registry</label>
                    <div class="relative">
                        <input type="text" id="searchInput" oninput="renderTable()" placeholder="Patient name or ward..." class="w-full pl-10 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500 font-medium">
                        <svg class="absolute left-3 top-2.5 text-slate-400" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    </div>
                </div>
                <div class="md:w-64">
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-1 tracking-widest">Team Dashboard</label>
                    <select id="teamFilter" onchange="renderTable()" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg font-semibold outline-none appearance-none cursor-pointer">
                        <option value="All">All Specialty Teams</option>
                        <option value="ICU Team">ICU Team</option>
                        <option value="Ortho Team">Ortho Team</option>
                        <option value="Geri Team">Geri Team</option>
                        <option value="Rehab Team">Rehab Team</option>
                        <option value="Onco Team">Onco Team</option>
                    </select>
                </div>
            </div>

            <!-- Table -->
            <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                <div class="overflow-x-auto scroll-hide">
                    <table class="w-full text-left border-collapse min-w-[950px]">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-200 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                <th class="px-6 py-4 w-32">Date</th>
                                <th class="px-6 py-4">Patient Details</th>
                                <th class="px-6 py-4">Route & Team</th>
                                <th class="px-6 py-4">Bed</th>
                                <th class="px-6 py-4 text-center">Cloud Status</th>
                                <th class="px-6 py-4 text-right">Log Time</th>
                            </tr>
                        </thead>
                        <tbody id="transferTableBody" class="divide-y divide-slate-100">
                            <tr><td colspan="6" class="px-6 py-20 text-center text-slate-400 font-bold">Synchronizing with cloud registry...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- New Entry View -->
        <div id="view-new-entry" class="hidden view-transition max-w-2xl mx-auto">
            <div class="bg-white rounded-2xl border border-slate-200 shadow-xl overflow-hidden">
                <div class="bg-indigo-600 px-8 py-8 text-white flex justify-between items-start">
                    <div>
                        <h2 class="text-2xl font-black tracking-tight uppercase">Transfer Record</h2>
                        <p class="text-indigo-100 text-[10px] mt-1 font-bold tracking-widest uppercase">Secured Cloud Submission</p>
                    </div>
                    <div class="bg-indigo-500 px-3 py-1 rounded text-[9px] font-black uppercase">v2.1 Sync</div>
                </div>
                <form id="transferForm" class="p-8 space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="md:col-span-2">
                            <label class="block text-xs font-black text-slate-500 uppercase mb-2 tracking-widest">Full Patient Name</label>
                            <input required type="text" id="patientName" class="w-full px-4 py-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-semibold" placeholder="e.g., John Doe">
                        </div>
                        <div>
                            <label class="block text-xs font-black text-slate-500 uppercase mb-2 tracking-widest">From Ward</label>
                            <select required id="originalWard" class="w-full px-4 py-3 border border-slate-200 rounded-xl font-bold bg-slate-50 outline-none">
                                <option value="">Select Ward</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-black text-indigo-600 uppercase mb-2 tracking-widest">To Ward</label>
                            <select required id="currentWard" onchange="autoAssignTeam()" class="w-full px-4 py-3 border-2 border-indigo-100 bg-indigo-50/30 rounded-xl font-bold text-indigo-900 outline-none">
                                <option value="">Select Ward</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-black text-slate-500 uppercase mb-2 tracking-widest">Bed No.</label>
                            <input required type="text" id="bedNumber" class="w-full px-4 py-3 border border-slate-200 rounded-xl font-semibold outline-none" placeholder="e.g., 22B">
                        </div>
                        <div>
                            <label class="block text-xs font-black text-slate-400 uppercase mb-2 tracking-widest">Auto-Assigned Team</label>
                            <div id="autoTeam" class="w-full px-4 py-3 bg-slate-100 border border-slate-200 rounded-xl font-black text-slate-600 italic">Select ward...</div>
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-xs font-black text-slate-500 uppercase mb-2 tracking-widest">Official Transfer Date</label>
                            <input required type="date" id="transferDate" class="w-full px-4 py-3 border border-slate-200 rounded-xl font-semibold outline-none">
                        </div>
                    </div>
                    <div class="pt-6 border-t border-slate-100 flex flex-col gap-3">
                        <button type="submit" id="submitBtn" class="w-full py-4 bg-indigo-600 text-white font-black rounded-xl hover:bg-indigo-700 shadow-lg transition-all uppercase tracking-widest text-xs">Upload to Cloud Board</button>
                        <button type="button" onclick="showView('board')" class="w-full py-3 text-slate-400 font-bold rounded-xl hover:bg-slate-50 uppercase tracking-widest text-[10px]">Cancel Submission</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <!-- Signature Overlay -->
    <div id="signatureModal" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-md z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all scale-100">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-indigo-50">
                <div>
                    <h3 class="font-black text-slate-800 uppercase text-lg">Handover Sync</h3>
                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Confirm Physio Receipt</p>
                </div>
                <button onclick="closeSignature()" class="text-slate-400 hover:text-slate-600 bg-white p-2 rounded-full shadow-sm active:scale-90 transition-transform">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="p-8">
                <canvas id="sig-canvas" class="signature-canvas w-full h-56 border-2 border-dashed border-slate-200 rounded-2xl bg-slate-50 shadow-inner"></canvas>
                <p class="text-center text-[9px] text-slate-400 mt-4 uppercase font-bold tracking-tighter">Sign within the dashed area</p>
                <div class="flex gap-4 mt-8">
                    <button onclick="clearSignature()" class="flex-1 py-4 px-4 border border-slate-200 text-slate-500 font-bold rounded-2xl text-[10px] uppercase tracking-widest hover:bg-slate-50 transition-all">Clear</button>
                    <button onclick="saveSignature()" id="confirmSigBtn" class="flex-[2] bg-emerald-600 text-white font-black py-4 rounded-2xl hover:bg-emerald-700 text-[10px] uppercase tracking-widest shadow-lg shadow-emerald-100 transition-all">Verify & Sync</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase System -->
    <script type="module">

const firebaseConfig = {
  apiKey: "AIzaSyB1FA6izXGfFjgqGiI4z0ITMxCKp0-F_bs",
  authDomain: "physioflow-c0916.firebaseapp.com",
  databaseURL: "https://physioflow-c0916-default-rtdb.firebaseio.com",
  projectId: "physioflow-c0916",
  storageBucket: "physioflow-c0916.firebasestorage.app",
  messagingSenderId: "477662839711",
  appId: "1:477662839711:web:12257f2e75c5a67b15f3aa"
};

        const TEAM_MAPPING = {
            "ICU Team": ["ICU", "CCU", "NICU", "5B", "6A", "12B", "13B", "UACC", "4C", "4D", "4E", "PICU", "5D"],
            "Ortho Team": ["EMW", "4C O&T", "4D O&T", "4E O&T", "10A", "10B", "9A", "9B"],
            "Geri Team": ["8A", "8B", "11A", "11B", "13A", "3C", "3D"],
            "Rehab Team": ["2C", "6B", "7B"],
            "Onco Team": ["2DM", "3EON", "4A", "4B", "5AC", "7A", "12A"]
        };
        const allWards = Object.values(TEAM_MAPPING).flat().sort();

        // Config & Init
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'physio-flow-cloud';

        let transfers = [];
        let currentSigningId = null;
        let currentUser = null;

        // AUTH & SYNC START
        const initCloud = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) { console.error("Cloud Access Error:", err); }
        };

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            const status = document.getElementById('connectionStatus');
            if (user) {
                status.innerHTML = `<div class="w-2 h-2 rounded-full bg-emerald-500"></div> Connected`;
                status.classList.replace('text-slate-400', 'text-emerald-600');
                startLiveSync();
            } else {
                status.innerHTML = `<div class="w-2 h-2 rounded-full bg-rose-500 pulse-red"></div> Offline`;
            }
        });

        function startLiveSync() {
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'transfers');
            onSnapshot(colRef, (snapshot) => {
                transfers = snapshot.docs.map(doc => ({ docId: doc.id, ...doc.data() }));
                // Multi-level sort: Transfer Date (desc) -> Log Time (desc)
                transfers.sort((a, b) => {
                    const dateA = new Date(a.transferDate || 0);
                    const dateB = new Date(b.transferDate || 0);
                    if (dateB - dateA !== 0) return dateB - dateA;
                    return (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0);
                });
                renderTable();
                updateStats();
            }, (err) => console.error("Sync Interrupted:", err));
        }

        // STATS LOGIC
        function updateStats() {
            const statsContainer = document.getElementById('statsDashboard');
            const teamCounts = {
                "Pending": transfers.filter(t => t.status === 'Pending').length,
                "ICU Team": transfers.filter(t => t.assignedTeam === "ICU Team" && t.status === 'Pending').length,
                "Ortho Team": transfers.filter(t => t.assignedTeam === "Ortho Team" && t.status === 'Pending').length,
                "Geri Team": transfers.filter(t => t.assignedTeam === "Geri Team" && t.status === 'Pending').length,
                "Rehab Team": transfers.filter(t => t.assignedTeam === "Rehab Team" && t.status === 'Pending').length
            };

            const labels = Object.keys(teamCounts);
            statsContainer.innerHTML = labels.map(label => {
                const count = teamCounts[label];
                const isOverall = label === 'Pending';
                return `
                    <div class="stat-card bg-white p-3 rounded-xl border ${isOverall ? 'border-rose-200 bg-rose-50/30' : 'border-slate-200'} shadow-sm flex flex-col justify-center items-center text-center">
                        <div class="text-[9px] font-black ${isOverall ? 'text-rose-600' : 'text-slate-400'} uppercase tracking-widest mb-1">${label}</div>
                        <div class="text-2xl font-black ${count > 0 && isOverall ? 'text-rose-600' : (count > 0 ? 'text-slate-800' : 'text-slate-300')} tracking-tighter">
                            ${count}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // VIEW LOGIC
        window.showView = (v) => {
            document.getElementById('view-board').classList.toggle('hidden', v !== 'board');
            document.getElementById('view-new-entry').classList.toggle('hidden', v !== 'new-entry');
            const tabB = document.getElementById('tab-board');
            const tabN = document.getElementById('tab-new');
            if (v === 'board') {
                tabB.className = 'px-6 py-2 rounded-lg text-sm font-bold transition-all bg-white text-indigo-600 shadow-sm';
                tabN.className = 'px-6 py-2 rounded-lg text-sm font-bold transition-all text-slate-600 hover:bg-slate-200';
            } else {
                tabB.className = 'px-6 py-2 rounded-lg text-sm font-bold transition-all text-slate-600 hover:bg-slate-200';
                tabN.className = 'px-6 py-2 rounded-lg text-sm font-bold transition-all bg-white text-indigo-600 shadow-sm';
            }
        };

        window.autoAssignTeam = () => {
            const ward = document.getElementById('currentWard').value;
            const display = document.getElementById('autoTeam');
            let found = "---";
            for (const team in TEAM_MAPPING) { if (TEAM_MAPPING[team].includes(ward)) { found = team; break; } }
            display.innerText = found;
            display.className = found === "---" ? "w-full px-4 py-3 bg-slate-100 border border-slate-200 rounded-xl font-black text-slate-400 italic" : "w-full px-4 py-3 bg-indigo-50 border border-indigo-200 rounded-xl font-black text-indigo-700";
        };

        // UI RENDERING
        window.renderTable = () => {
            const tbody = document.getElementById('transferTableBody');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filter = document.getElementById('teamFilter').value;

            const filtered = transfers.filter(t => {
                const matchesTeam = filter === 'All' || t.assignedTeam === filter;
                const matchesSearch = t.patientName?.toLowerCase().includes(search) || 
                                     t.currentWard?.toLowerCase().includes(search);
                return matchesTeam && matchesSearch;
            });

            if (!filtered.length) {
                tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-20 text-center text-slate-400 font-bold italic">No active transfers found in the cloud registry.</td></tr>`;
                return;
            }

            tbody.innerHTML = filtered.map(t => {
                const isAck = t.status === 'Acknowledged';
                const now = Date.now();
                const logTime = t.createdAt?.toMillis() || 0;
                const isOld = !isAck && (now - logTime > 3600000); // Highlight if over 1 hour old
                
                const timeStr = t.createdAt ? new Date(logTime).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '--:--';
                
                return `
                <tr class="hover:bg-indigo-50/30 transition-colors group ${isOld ? 'pulse-indigo' : ''}">
                    <td class="px-6 py-5">
                        <div class="text-[11px] font-black text-slate-800 uppercase tabular-nums">${t.transferDate || 'N/A'}</div>
                    </td>
                    <td class="px-6 py-5">
                        <div class="font-bold text-slate-800 text-sm sm:text-base">${t.patientName}</div>
                    </td>
                    <td class="px-6 py-5">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="px-2 py-0.5 bg-slate-100 rounded text-[9px] text-slate-600 font-black border border-slate-200">${t.originalWard}</span>
                            <svg class="text-slate-300" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                            <span class="px-2 py-0.5 bg-indigo-50 rounded text-[9px] text-indigo-700 font-black border border-indigo-100">${t.currentWard}</span>
                        </div>
                        <div class="text-[9px] text-indigo-500/70 font-black uppercase tracking-wider pl-1">${t.assignedTeam}</div>
                    </td>
                    <td class="px-6 py-5">
                        <div class="text-xs font-black text-slate-700 bg-slate-100 w-fit px-2 py-0.5 rounded">${t.bedNumber}</div>
                    </td>
                    <td class="px-6 py-5">
                        <div class="flex flex-col items-center justify-center gap-1.5">
                            <button onclick="openSignature('${t.docId}')" ${isAck ? 'disabled' : ''} 
                                class="inline-flex items-center gap-1 px-4 py-1.5 rounded-full text-[9px] font-black uppercase tracking-tight transition-all border 
                                ${isAck ? 'bg-emerald-50 text-emerald-600 border-emerald-100 cursor-default shadow-sm' : 'bg-rose-50 text-rose-600 border-rose-200 pulse-red hover:bg-rose-100 cursor-pointer shadow-sm'}">
                                ${isAck ? 'Cloud Verified' : 'Awaiting Sign'}
                            </button>
                            ${t.signature ? `<img src="${t.signature}" class="h-6 opacity-30 grayscale contrast-125" />` : ''}
                        </div>
                    </td>
                    <td class="px-6 py-5 text-right">
                        <div class="text-[10px] text-slate-400 font-mono font-bold">${timeStr}</div>
                        ${isOld ? `<div class="text-[8px] text-rose-500 font-black uppercase tracking-tighter mt-1">High Priority</div>` : ''}
                    </td>
                </tr>`;
            }).join('');
        };

        // SIG LOGIC
        const canvas = document.getElementById('sig-canvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;

        window.openSignature = (id) => {
            currentSigningId = id;
            document.getElementById('signatureModal').classList.remove('hidden');
            const ratio = window.devicePixelRatio || 1;
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            ctx.scale(ratio, ratio);
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#312e81';
            window.clearSignature();
        };

        window.closeSignature = () => { document.getElementById('signatureModal').classList.add('hidden'); currentSigningId = null; };
        window.clearSignature = () => ctx.clearRect(0, 0, canvas.width, canvas.height);
        window.saveSignature = async () => {
            if (!currentSigningId || !currentUser) return;
            const btn = document.getElementById('confirmSigBtn');
            btn.disabled = true; btn.innerText = "Syncing...";
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'transfers', currentSigningId);
                await updateDoc(docRef, { status: 'Acknowledged', signature: canvas.toDataURL() });
                window.closeSignature();
            } catch (err) { console.error("Signature Sync Fail:", err); }
            finally { btn.disabled = false; btn.innerText = "Verify & Sync"; }
        };

        // FORM SUBMISSION
        document.getElementById('transferForm').onsubmit = async function(e) {
            e.preventDefault();
            if (!currentUser) return;
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "Uploading...";

            const payload = {
                patientName: document.getElementById('patientName').value.trim(),
                originalWard: document.getElementById('originalWard').value,
                currentWard: document.getElementById('currentWard').value,
                bedNumber: document.getElementById('bedNumber').value.trim(),
                assignedTeam: document.getElementById('autoTeam').innerText,
                transferDate: document.getElementById('transferDate').value,
                status: 'Pending',
                signature: null,
                createdAt: serverTimestamp()
            };

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'transfers'), payload);
                this.reset();
                showView('board');
            } catch (err) { console.error("Cloud Upload Fail:", err); }
            finally { btn.disabled = false; btn.innerText = "Upload to Cloud Board"; }
        };

        // TOUCH SUPPORT
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const cx = e.clientX || (e.touches && e.touches[0].clientX);
            const cy = e.clientY || (e.touches && e.touches[0].clientY);
            return { x: cx - rect.left, y: cy - rect.top };
        }
        canvas.addEventListener('mousedown', (e) => { drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); });
        canvas.addEventListener('mousemove', (e) => { if (!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); });
        canvas.addEventListener('touchstart', (e) => { drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); e.preventDefault(); }, {passive: false});
        canvas.addEventListener('touchmove', (e) => { if (!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); e.preventDefault(); }, {passive: false});
        window.addEventListener('mouseup', () => drawing = false);
        window.addEventListener('touchend', () => drawing = false);

        // BOOTSTRAP
        window.onload = () => {
            const o = document.getElementById('originalWard');
            const c = document.getElementById('currentWard');
            allWards.forEach(w => { o.options.add(new Option(w, w)); c.options.add(new Option(w, w)); });
            document.getElementById('transferDate').value = new Date().toISOString().split('T')[0];
            initCloud();
            // Refresh relative times every minute
            setInterval(renderTable, 60000);
        };
    </script>
</body>
</html>
